layers:
  - fixed: Rellis-3D
  - sequence
  - modality:
      lidar: os1_cloud_node_kitti_bin
      labels: os1_cloud_node_semantickitti_label_id
modalities:
  lidar:
    ext: .bin
    dtype: float32
    reshape: [-1, 4]
  labels:
    ext: .label
    dtype: int32
    torch_dtype: int64
  poses:
    ext: .txt
    loader: txt_rows
    reshape: [3, 4]
    optional: true
splits:
  type: lst
  train: pt_train.lst
  val: pt_val.lst
  test: pt_test.lst
