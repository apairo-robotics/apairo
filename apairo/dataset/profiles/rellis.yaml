layers:
  - fixed: Rellis-3D
  - sequence
  - modality:
      lidar: os1_cloud_node_kitti_bin
      labels: os1_cloud_node_semantickitti_label_id
modalities:
  lidar:
    ext: .bin
    dtype: float32
    reshape: [-1, 4]
  labels:
    ext: .label
    dtype: int32
    cast_dtype: int64
  poses:
    ext: .txt
    loader: txt_rows
    reshape: [3, 4]
    optional: true
splits:
  type: lst
  train: pt_train.lst
  val: pt_val.lst
  test: pt_test.lst
# The lidar/labels frames are positional, but each is co-captured with a camera
# frame whose filename carries the timestamp -- so the camera IS the frame clock,
# shared by lidar and labels even when the camera is not among the loaded keys.
# Optional: a Rellis subset without the camera directory stays clockless.
clock:
  dir: pylon_camera_node
  ext: .jpg
  name: 'frame\d+-(\d+)_(\d+)'
  units: [s, ms]
